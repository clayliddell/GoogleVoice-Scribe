name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lightweight test dependencies
        run: python -m pip install --upgrade pip pytest numpy

      - name: Compile Python sources
        shell: pwsh
        run: |
          Get-ChildItem service -Filter *.py -Recurse | ForEach-Object {
            python -m py_compile $_.FullName
          }
          python -m py_compile scripts/benchmark-pipeline.py
          python -m py_compile scripts/test-title-generation.py

      - name: Run tests
        shell: pwsh
        run: |
          $env:PYTHONPATH = "$PWD/service"
          python -m pytest

      - name: Build extension package
        shell: pwsh
        run: .\scripts\build-extension.ps1
