name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lightweight test dependencies
        shell: cmd
        run: python -m pip install --upgrade pip pytest numpy pillow

      - name: Validate
        shell: cmd
        run: python scripts\ci_validate.py --build-extension
