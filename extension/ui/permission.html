<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Microphone Permission</title>
    <style>
      body {
        background: #f8fafc;
        color: #1f2937;
        font: 14px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 24px;
        max-width: 680px;
      }

      label {
        display: block;
        font-weight: 600;
        margin: 18px 0 6px;
      }

      select {
        background: white;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        box-sizing: border-box;
        color: #111827;
        font: inherit;
        max-width: 100%;
        padding: 8px;
        width: 520px;
      }

      button {
        background: #0f766e;
        border: 0;
        border-radius: 6px;
        color: white;
        cursor: pointer;
        font: inherit;
        margin-top: 12px;
        padding: 9px 13px;
      }

      button.secondary {
        background: #334155;
      }

      #status {
        margin-top: 14px;
      }

      .meter {
        background: #e2e8f0;
        border-radius: 999px;
        height: 14px;
        margin-top: 12px;
        overflow: hidden;
        width: 520px;
      }

      #level {
        background: #0f766e;
        height: 100%;
        transform-origin: left center;
        transform: scaleX(0);
        width: 100%;
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      code {
        background: #e2e8f0;
        border-radius: 4px;
        padding: 2px 4px;
      }
    </style>
  </head>
  <body>
    <h1>Microphone Setup</h1>
    <p>Choose the same microphone you use for Google Voice, then speak and confirm the level meter moves.</p>

    <label for="device">Microphone</label>
    <select id="device"></select>

    <div class="row">
      <button id="grant">Test selected microphone</button>
      <button id="stop" class="secondary">Stop test</button>
    </div>

    <div class="meter" aria-label="Microphone level">
      <div id="level"></div>
    </div>

    <div id="status" role="status"></div>
    <script src="permission.js"></script>
  </body>
</html>
